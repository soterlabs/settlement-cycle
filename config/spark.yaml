# Spark prime agent — multi-chain (Ethereum, Base, Arbitrum, Optimism,
# Unichain, Avalanche-C) ALM + Anchorage off-chain custodial position.
#
# Source of truth for Spark-specific addresses, ilk, venues. Venue list seeded
# from BA Labs `stars-api.blockanalitica.com/allocations/?star=spark` snapshot
# (2026-04-29) and cross-checked against `docs/ALM_COUNTERPARTIES.md` +
# `docs/pricing/allocation_pricing.csv`.
#
# Status (2026-04-29): scaffolding pass. Many venues are wired with the
# correct addresses + pricing category, but two pricing paths are NOT yet
# implemented:
#   * PSM3 (Spark's Peg Stability Module on non-Ethereum chains): the contract
#     is a basket holder (USDC + USDS + sUSDS shares); needs a dedicated source
#     and oracle kind. Marked `pricing_category: E` with `kind: psm3` for now;
#     the runtime will reject these until the source is registered.
#   * Anchorage (off-chain custodial $150M position on Ethereum): API-only;
#     requires Anchorage developer credentials. Marked `pricing_category: E`
#     with `kind: anchorage`; same TODO.

id: spark
ilk_bytes32: '0x414c4c4f4341544f522d535041524b2d41000000000000000000000000000000'  # ALLOCATOR-SPARK-A
start_date: '2024-11-18'   # first frob on ALLOCATOR-SPARK-A (Dune query 7399640)

# Subsidised borrowing rate (debt-rate-methodology Step 1.b). Same program
# parameters as Grove. Daily reference rates in
# config/subsidy_reference_rates.yaml.
#
# ref_rate_kind: per Sky governance (2026-05-02), Spark uses EFFR (NY Fed
# Effective Federal Funds Rate). Grove uses 3M T-Bill instead.
subsidy:
  enabled: true
  cap_usd: 1000000000      # First $1B at subsidised rate; excess at full BR
  program_start: '2026-01-01'
  ramp_months: 24
  ref_rate_kind: effr

addresses:
  ethereum:
    subproxy: '0x691a6c29e9e96dd897718305427ad5d534db16ba'    # urn for ALLOCATOR-SPARK-A; 49,789 frob calls (most active allocator)
    alm:      '0x1601843c5e9bc251a3272907010afa41fa18347e'    # Spark Ethereum ALM (cross-chain hub)
    psm:
      kind: directed_flow                                     # Sky LITE-PSM-USDC: USDS swap conduit (shared across primes)
      address: '0x37305b1cd40574e4c5ce33f8e8306be057fd7341'
      token:   '0xdc035d45d973e3ec169d2276ddab16f1e407384f'   # USDS
