# Subsidy reference rate — daily values used in the subsidised borrowing
# rate formula (debt-rate-methodology):
#
#   subsidised_apy_d = ref_rate_d + (base_apy − ref_rate_d) × T / 24
#
# where T is the number of months elapsed since the subsidy program start
# (2026-01-01 per Sky governance — i.e. T=1 for Feb 2026, T=2 for Mar, …).
#
# Sky's spec names this the EFFR (Effective Federal Funds Rate, NY Fed:
# https://www.newyorkfed.org/markets/reference-rates/effr). For Feb 2026
# EFFR ≈ 4.33%, which is ~ at-or-above BR (SSR+30bps ≈ 4.30%) — under that
# rate the subsidy yields ≈ 0 benefit.
#
# Grove team's Feb 2026 PnL workbook (data/grove/feb_2026.xlsx) uses the
# 3-month T-Bill rate (~3.67–3.74%) instead, producing a ~26bps subsidy
# below BR. This file records BOTH series so reproductions are explicit;
# the per-prime ``subsidy.ref_rate_kind`` selects which column to read:
#
#   tbill_3m_apy:  treasury.gov 3M T-Bill (matches Grove sheet)
#   effr_apy:      NY Fed EFFR
#
# Source URLs:
#   EFFR:    https://markets.newyorkfed.org/api/rates/unsecured/effr/last/N.json
#   T-Bill:  https://home.treasury.gov/resource-center/data-chart-center/
#            interest-rates/TextView?type=daily_treasury_yield_curve

# Per Sky governance (2026-05-02): Grove uses tbill_3m, Spark uses effr.
# Each prime's ``subsidy.ref_rate_kind`` in its own YAML drives the lookup
# against the per-rate columns below.

# Use the most-recent rate ≤ the target date (carry-forward, like SSR).
# Weekend/holiday gaps fall through to the previous business-day rate.
rates:
  # 2026-01 — T-Bill 3M (carry-forward to fill weekends; values from
  # treasury.gov daily yield curve. Used to verify Grove sheet methodology.)
  - effective_date: '2026-01-01'
    tbill_3m_apy: 0.0367
    effr_apy: 0.0433
  - effective_date: '2026-01-31'
    tbill_3m_apy: 0.0367
    effr_apy: 0.0433

