    pricing_category: E
    sky_direct: true   # Sky Direct: Treasury Bill on Ethereum (Grove)
    token:
      address: '0x6a9da2d710bb9b700acde7cb81f10f1ff8c89041'
      symbol: 'BUIDL-I'
      decimals: 6
    # Per docs/pricing/allocation_pricing.csv row 33: BUIDL-I is hardcoded
    # at $1.00. Issuer publishes NAV but for settlement we pin to $1 — yield
    # is captured via the actual rewards received by the ALM, not via MtM.
    nav_oracle:
      kind: const_one
    # BlackRock's BUIDL contract mints both capital subscriptions AND yield
    # distributions to ALM (both arrive as ERC-20 mints from 0x0). A bimodal
    # histogram on observed amounts (Dune query 7387737) shows a clean gap
    # between yield (<$1M, dozens per period) and capital (≥$10M, a few
    # large round-number mints). Filter at $1M to isolate capital flow for
    # cost-basis tracking — sub-threshold mints contribute to revenue.
    min_transfer_amount_usd: 1000000

