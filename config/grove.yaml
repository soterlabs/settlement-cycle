# Sources:
# - Token addresses + oracles: docs/pricing/allocation_pricing.csv
# - ALM addresses: docs/pricing/holding_addresses.csv
# - Ilk + subproxy + start dates: docs/grove/PRD.md §3
# - Venue inventory: docs/grove/PRD.md §4.1 (E1–E18, with E5/E6/E18 notes below)

