# Source dispatch (debt → Dune, prices → RPC + on-chain oracles, etc.) is
# resolved by `src/settle/normalize/registry.py`, not by this file.
# Per-venue oracle choices are encoded in each venue's `nav_oracle` block.

# Cat A inflow source-tagging — addresses whose transfers to/from the ALM are
# considered INTERNAL (not yield). Compute auto-adds every venue's
# token.address on the same chain to this list, so we only need to enumerate
# Sky-side infrastructure + protocol-level pools (Aave) here. Inflows from
# any address NOT in this list (after auto-augmentation) are treated as
# revenue — captures off-chain Anchorage-style yields.
# Cat A revenue allowlist — counterparties that send REALIZED YIELD directly
# to the ALM proxy (off-chain custodian distributions, e.g. Anchorage). Their
# inflows pass through to revenue. Anything NOT listed here is treated as
# value-preserving capital movement (PSM swap legs, venue allocations, etc.)
# and netted out. Default empty → revenue_E_x = 0 for par-stables.
# Add an entry like the example below when an off-chain yield source lands:
#
# external_alm_sources:
#   ethereum:
#     - '0x...'   # Anchorage custodian for token X
